[platformio]
src_dir = .

; ── Firmware real ──────────────────────────────────────────────────────────
[env:esp8266]
platform = espressif8266
board = esp01_1m
framework = arduino
lib_deps =
    bblanchon/ArduinoJson@^6.21.4
    gilmaimon/ArduinoWebsockets@^0.5.4

; ── Testes nativos (host) ───────────────────────────────────────────────────
[env:native]
platform = native
test_framework = unity
build_src_filter = -<*>          ; não compila o .ino no env nativo
build_flags =
    -std=c++17
    -I test/stubs                        ; stubs Arduino antes de qualquer path do sistema
    -I .                                 ; headers do projeto (.h na raiz)
    -Dfirmware_version=\"dev\"
    -DARDUINOJSON_ENABLE_ARDUINO_STRING=1  ; habilita as<String>() com nosso mock
    -DARDUINOJSON_ENABLE_PROGMEM=0         ; desabilita pgm_read_byte / FlashString
lib_deps =
    bblanchon/ArduinoJson@^6.21.4
